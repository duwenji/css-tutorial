<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: sans-serif; }
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .header {
    flex-shrink: 0;
    background: #1a1a2e;
    color: #fff;
    padding: 16px;
  }
  .body {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .sidebar {
    flex-shrink: 0;
    width: 240px;
    background: #f5f5f5;
    padding: 16px;
    overflow-y: auto;
  }
  .main {
    flex: 1;
    min-width: 0;
    padding: 16px;
    overflow-y: auto;
  }
  @media (max-width: 768px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>
  <div id="root">
    <div class="app">
      <header class="header">レスポンシブダッシュボード</header>
      <div class="body">
        <aside class="sidebar">
          <p>メニュー1</p><p>メニュー2</p><p>メニュー3</p>
        </aside>
        <main class="main">
          <p>幅768px以下でサイドバーが消えます</p>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
