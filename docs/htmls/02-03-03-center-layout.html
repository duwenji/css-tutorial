<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .center-layout {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .centered-box {
    background: #4a90d9;
    color: #fff;
    padding: 40px 60px;
    border-radius: 8px;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="center-layout">
    <div class="centered-box">縦横中央に配置されたボックス</div>
  </div>
</body>
</html>
