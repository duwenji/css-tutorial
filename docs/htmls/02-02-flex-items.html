<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; }
  .page {
    display: flex;
    flex-direction: column;
    height: 400px;
    border: 2px solid #333;
  }
  .header {
    flex-shrink: 0;
    background: #333;
    color: #fff;
    padding: 16px;
  }
  .content {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px;
    background: #f5f5f5;
  }
  .content-item {
    background: #fff;
    border: 1px solid #ddd;
    padding: 12px;
    margin-bottom: 8px;
  }
  .footer {
    flex-shrink: 0;
    background: #333;
    color: #fff;
    padding: 12px 16px;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="header">固定ヘッダー（flex-shrink: 0）</div>
    <div class="content">
      <div class="content-item">アイテム 1</div>
      <div class="content-item">アイテム 2</div>
      <div class="content-item">アイテム 3</div>
      <div class="content-item">アイテム 4</div>
      <div class="content-item">アイテム 5</div>
      <div class="content-item">アイテム 6</div>
      <div class="content-item">アイテム 7</div>
      <div class="content-item">アイテム 8</div>
    </div>
    <div class="footer">固定フッター（flex-shrink: 0）</div>
  </div>
</body>
</html>
