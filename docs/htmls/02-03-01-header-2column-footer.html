<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; }
  .layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .header {
    flex-shrink: 0;
    background: #333;
    color: #fff;
    padding: 16px;
  }
  .body {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .sidebar {
    flex-shrink: 0;
    width: 200px;
    background: #e8e8e8;
    padding: 16px;
    overflow-y: auto;
  }
  .main {
    flex: 1;
    min-width: 0;
    padding: 16px;
    overflow-y: auto;
  }
  .footer {
    flex-shrink: 0;
    background: #333;
    color: #fff;
    padding: 12px 16px;
  }
</style>
</head>
<body>
  <div class="layout">
    <header class="header">ヘッダー</header>
    <div class="body">
      <aside class="sidebar">サイドバー（200px固定）</aside>
      <main class="main">メイン領域（可変）</main>
    </div>
    <footer class="footer">フッター</footer>
  </div>
</body>
</html>
