<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: sans-serif; }
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 800px;
    margin: 0 auto;
    border-left: 1px solid #e0e0e0;
    border-right: 1px solid #e0e0e0;
  }
  .chat-header {
    flex-shrink: 0;
    background: #1a1a2e;
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-header__avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #4a90d9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }
  .message-list {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 20px;
    background: #f5f6fa;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message { display: flex; gap: 12px; max-width: 80%; }
  .message--incoming { align-self: flex-start; }
  .message--outgoing { align-self: flex-end; flex-direction: row-reverse; }
  .message__avatar {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .message--incoming .message__avatar { background: #e0e0e0; }
  .message--outgoing .message__avatar { background: #4a90d9; color: #fff; }
  .message__bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
  }
  .message--incoming .message__bubble {
    background: #fff;
    border-top-left-radius: 4px;
  }
  .message--outgoing .message__bubble {
    background: #4a90d9;
    color: #fff;
    border-top-right-radius: 4px;
  }
  .chat-input {
    flex-shrink: 0;
    background: #fff;
    border-top: 1px solid #e0e0e0;
    padding: 16px 20px;
    display: flex;
    gap: 12px;
  }
  .chat-input__field {
    flex: 1;
    min-height: 44px;
    max-height: 120px;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    resize: none;
    outline: none;
    font-family: inherit;
  }
  .chat-input__field:focus { border-color: #4a90d9; }
  .chat-input__send {
    flex-shrink: 0;
    background: #4a90d9;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    cursor: pointer;
  }
  .chat-input__send:hover { background: #357abd; }
</style>
</head>
<body>
  <div id="root">
    <div class="app">
      <header class="chat-header">
        <div class="chat-header__avatar">AI</div>
        <div>
          <div style="font-weight: bold;">AI アシスタント</div>
          <div style="font-size: 13px; opacity: 0.7;">オンライン</div>
        </div>
      </header>
      <div class="message-list">
        <div class="message message--incoming">
          <div class="message__avatar">AI</div>
          <div class="message__bubble">こんにちは！どのようなお手伝いができますか？</div>
        </div>
        <div class="message message--outgoing">
          <div class="message__avatar">You</div>
          <div class="message__bubble">CSSレイアウトについて教えてください</div>
        </div>
        <div class="message message--incoming">
          <div class="message__avatar">AI</div>
          <div class="message__bubble">
            レイアウト設計原則では、高さ伝播にflexを使い、固定値はルートのみに制限します。
            また、flex子要素には必ずmin-height: 0を設定します。
          </div>
        </div>
      </div>
      <div class="chat-input">
        <textarea class="chat-input__field" placeholder="メッセージを入力..." rows="2"></textarea>
        <button class="chat-input__send">送信</button>
      </div>
    </div>
  </div>
</body>
</html>
