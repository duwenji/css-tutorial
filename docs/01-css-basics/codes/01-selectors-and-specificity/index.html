<!DOCTYPE html>
<html>
<head>
<style>
  /* 詳細度 0,0,0,1 */
  p { color: red; }

  /* 詳細度 0,0,1,0 — こちらが勝つ */
  .text { color: blue; }

  /* 詳細度 0,1,0,0 — IDが最優先 */
  #highlight { color: green; }

  /* 詳細度 0,0,1,1 — div + classより強い */
  p.text { font-weight: bold; }
</style>
</head>
<body>
  <p class="text" id="highlight">このテキストは緑色で太字</p>
  <p>このテキストは赤色</p>
  <p class="text">このテキストは青色で太字</p>
</body>
</html>
